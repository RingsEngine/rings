<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rings — Generic6DofSpringConstraint 极简示例</title>
  <style>
    html, body { margin: 0; height: 100%; width: 100%; overflow: hidden; }
    #canvas { display: block; width: 100%; height: 100%; }
    .hud {
      position: absolute; left: 8px; top: 8px; right: 8px; pointer-events: none;
      font-size: 11px; line-height: 1.5; color: #e6edf3; text-shadow: 0 1px 3px #000;
      font-family: ui-monospace, monospace;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "@rings-webgpu/core": "https://unpkg.com/@rings-webgpu/core@1.0.52/dist/rings.es.js",
      "@rings-webgpu/ammo": "https://unpkg.com/@rings-webgpu/ammo@0.2.1/ammo.js"
    }
  }
  </script>
</head>
<body>
  <canvas id="canvas" style="width: 100%; height: 100%;"></canvas>
  <div class="hud">
    <strong>Generic6DofSpringConstraint</strong>：静态顶板 + 动态块，<code>enableSpring(1)</code> + 刚度/阻尼/平衡点。
    顺序：<code>Engine3D.init</code> → <code>Physics.init</code> → 建物体。<code>useDrag</code> 可拖块。
  </div>
  <script type="module">
    import {
      Engine3D, Scene3D, Object3D, Camera3D, View3D, Color, Vector3,
      LitMaterial, BoxGeometry, MeshRenderer,
      AtmosphericComponent, DirectLight, HoverCameraController,
    } from 'https://unpkg.com/@rings-webgpu/core@1.0.52/dist/rings.es.js';
    import {
      Physics,
      Rigidbody,
      Generic6DofSpringConstraint,
      CollisionShapeUtil,
    } from 'https://unpkg.com/@rings-webgpu/physics@0.0.2/dist/physics.es.js';

    async function main() {
      const canvas = document.getElementById("canvas");
      if (!canvas) return;

      try {
        await Engine3D.init({
          canvasConfig: { canvas },
          beforeRender: () => {
            if (Physics.isInited) Physics.update();
          },
        });
      } catch (e) {
        document.body.innerHTML =
          "<p style=\"padding:1rem;font-family:sans-serif\">WebGPU 初始化失败。</p>";
        console.error(e);
        return;
      }

      await Physics.init({ useDrag: true });

      const scene = new Scene3D();
      scene.addComponent(AtmosphericComponent);

      const cam = new Object3D();
      const camera = cam.addComponent(Camera3D);
      camera.perspective(52, canvas.clientWidth / Math.max(canvas.clientHeight, 1), 0.1, 200);
      cam.addComponent(HoverCameraController).setCamera(18, -40, 11);
      scene.addChild(cam);

      const sun = new Object3D();
      sun.addComponent(DirectLight).intensity = 1.2;
      scene.addChild(sun);

      const ground = new Object3D();
      const gMesh = ground.addComponent(MeshRenderer);
      gMesh.geometry = new BoxGeometry(18, 0.2, 12);
      gMesh.material = new LitMaterial();
      gMesh.material.baseColor = new Color(0.25, 0.27, 0.3, 1);
      ground.addComponent(Rigidbody).shape = CollisionShapeUtil.createBoxShape(ground);
      ground.getComponent(Rigidbody).mass = 0;
      scene.addChild(ground);

      const top = new Object3D();
      top.y = 4;
      const tMesh = top.addComponent(MeshRenderer);
      tMesh.geometry = new BoxGeometry(2, 0.2, 0.8);
      tMesh.material = new LitMaterial();
      tMesh.material.baseColor = new Color(0.5, 0.48, 0.45, 1);
      const topRb = top.addComponent(Rigidbody);
      topRb.shape = CollisionShapeUtil.createBoxShape(top);
      topRb.mass = 0;
      scene.addChild(top);

      const box = new Object3D();
      box.y = 2.5;
      const bMesh = box.addComponent(MeshRenderer);
      bMesh.geometry = new BoxGeometry(0.5, 0.5, 0.5);
      bMesh.material = new LitMaterial();
      bMesh.material.baseColor = new Color(0.9, 0.55, 0.25, 1);
      const rb = box.addComponent(Rigidbody);
      rb.shape = CollisionShapeUtil.createBoxShape(box);
      rb.mass = 1;
      scene.addChild(box);

      const spring = box.addComponent(Generic6DofSpringConstraint);
      spring.targetRigidbody = topRb;
      spring.pivotSelf.setTo(0, 0.26, 0);
      spring.pivotTarget.setTo(0, -0.1, 0);
      spring.linearLowerLimit = new Vector3(-0.35, -1.5, -0.35);
      spring.linearUpperLimit = new Vector3(0.35, 1, 0.35);
      spring.enableSpring(1, true);
      spring.setStiffness(1, 90);
      spring.setDamping(1, 6);
      spring.setEquilibriumPoint(1, 0);
      spring.disableCollisionsBetweenLinkedBodies = true;

      const view = new View3D();
      view.scene = scene;
      view.camera = camera;
      Engine3D.startRenderView(view);
    }

    main().catch(console.error);
  </script>
  <p style="position:absolute;bottom:6px;left:8px;right:8px;font-size:10px;color:#8b9cb3;margin:0">
    unpkg + importmap；HTTP(S) 打开，勿 file://。
  </p>
</body>
</html>
