<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rings — 物理：GhostTrigger 幽灵触发体</title>
  <script type="importmap">
    {
      "imports": {
        "@rings-webgpu/core": "https://unpkg.com/@rings-webgpu/core@1.0.52/dist/rings.es.js",
        "@rings-webgpu/physics": "../../packages/physics/dist/physics.es.js"
      }
    }
  </script>
  <style>
    html, body { margin: 0; height: 100%; width: 100%; overflow: hidden; }
    #canvas { display: block; width: 100%; height: 100%; }
    .hud {
      position: absolute; left: 8px; top: 8px; right: 8px; pointer-events: none;
      font-size: 11px; color: #e6edf3; text-shadow: 0 1px 3px #000;
      font-family: ui-monospace, monospace;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="hud" id="hud">
    半透明区域为 <code>GhostTrigger</code> + <code>CollisionShapeUtil.createBoxShape</code>；球体穿过时尝试通过 <code>collisionEvent</code> 计数（依赖 ContactProcessed 与幽灵对象配对）。
  </div>
  <script type="module">
    import {
      Engine3D, Scene3D, Object3D, Camera3D, View3D, Color, Vector3,
      LitMaterial, BoxGeometry, SphereGeometry, MeshRenderer,
      AtmosphericComponent, DirectLight, HoverCameraController,
      ColliderComponent,
    } from "@rings-webgpu/core";
    import { Physics, Rigidbody, GhostTrigger, CollisionShapeUtil } from "@rings-webgpu/physics";

    async function main() {
      const canvas = document.getElementById("canvas");
      const hud = document.getElementById("hud");
      if (!canvas) return;

      try {
        await Engine3D.init({
          canvasConfig: { canvas },
          beforeRender: () => { if (Physics.isInited) Physics.update(); },
        });
      } catch (e) {
        document.body.innerHTML = "<p style=\"padding:1rem\">WebGPU 初始化失败。</p>";
        console.error(e);
        return;
      }

      await Physics.init({});

      const scene = new Scene3D();
      scene.addComponent(AtmosphericComponent);

      const camObj = new Object3D();
      const camera = camObj.addComponent(Camera3D);
      camera.perspective(55, canvas.clientWidth / Math.max(canvas.clientHeight, 1), 0.1, 200);
      camObj.addComponent(HoverCameraController).setCamera(25, -35, 14);
      scene.addChild(camObj);

      const lightObj = new Object3D();
      lightObj.addComponent(DirectLight).intensity = 1.1;
      scene.addChild(lightObj);

      const ground = new Object3D();
      const gMr = ground.addComponent(MeshRenderer);
      gMr.geometry = new BoxGeometry(22, 0.2, 22);
      gMr.material = new LitMaterial();
      gMr.material.baseColor = new Color(0.26, 0.28, 0.32, 1);
      const gCol = ground.addComponent(ColliderComponent);
      gCol.shape.setFromCenterAndSize(new Vector3(0, 0, 0), new Vector3(22, 0.2, 22));
      const gRb = ground.addComponent(Rigidbody);
      gRb.mass = 0;
      scene.addChild(ground);

      const zone = new Object3D();
      zone.y = 1.2;
      const zMr = zone.addComponent(MeshRenderer);
      zMr.geometry = new BoxGeometry(2.5, 2.5, 2.5);
      zMr.material = new LitMaterial();
      zMr.material.baseColor = new Color(0.9, 0.85, 0.2, 1);
      const ghost = zone.addComponent(GhostTrigger);
      ghost.shape = CollisionShapeUtil.createBoxShape(zone);
      let hits = 0;
      ghost.collisionEvent = () => {
        hits++;
        if (hud && hits % 3 === 1) hud.textContent = `GhostTrigger 碰撞回调累计约 ${hits} 次（节流显示）`;
      };

      scene.addChild(zone);

      const ball = new Object3D();
      ball.y = 6;
      ball.z = -4;
      const bMr = ball.addComponent(MeshRenderer);
      bMr.geometry = new SphereGeometry(0.4, 18, 18);
      bMr.material = new LitMaterial();
      bMr.material.baseColor = new Color(0.35, 0.8, 0.95, 1);
      const bCol = ball.addComponent(ColliderComponent);
      bCol.shape.setFromCenterAndSize(new Vector3(0, 0, 0), new Vector3(0.8, 0.8, 0.8));
      const bRb = ball.addComponent(Rigidbody);
      bRb.mass = 0.6;
      scene.addChild(ball);

      const view = new View3D();
      view.scene = scene;
      view.camera = camera;
      Engine3D.startRenderView(view);
    }

    main().catch(console.error);
  </script>
  <p style="position:absolute;bottom:6px;left:8px;font-size:10px;color:#8b9cb3;margin:0">
    需 <code>npm run build:physics</code> + 仓库根目录 HTTP 访问。
  </p>
</body>
</html>
