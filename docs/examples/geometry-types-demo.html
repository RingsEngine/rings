<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rings — 几何体系统演示（Box / Sphere / Cylinder / Torus / Plane）</title>
  <style>
    html, body { margin: 0; height: 100%; width: 100%; overflow: hidden; }
    body { position: relative; font-family: system-ui, "Segoe UI", sans-serif; }
    #canvas { display: block; width: 100%; height: 100%; }
    .hud {
      position: absolute; left: 8px; top: 8px; right: 240px; pointer-events: none;
      font-size: 11px; line-height: 1.45; color: #e6edf3; text-shadow: 0 1px 3px #000;
      font-family: ui-monospace, monospace;
    }
    .hint {
      position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
      color: #8b9cb3; font-size: 12px; text-align: center; pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas" style="width: 100%; height: 100%;"></canvas>
  <div class="hud" id="hud"></div>
  <p class="hint">从左到右：BoxGeometry · SphereGeometry · CylinderGeometry · TorusGeometry；地面为 PlaneGeometry</p>
  <script type="module">
    import {
      Engine3D,
      Scene3D,
      Object3D,
      Camera3D,
      View3D,
      Vector3,
      Color,
      LitMaterial,
      BoxGeometry,
      SphereGeometry,
      CylinderGeometry,
      TorusGeometry,
      PlaneGeometry,
      MeshRenderer,
      AtmosphericComponent,
      DirectLight,
      HoverCameraController,
    } from 'https://unpkg.com/@rings-webgpu/core@1.0.52/dist/rings.es.js';

    async function main() {
      const canvas = document.getElementById('canvas');
      const hud = document.getElementById('hud');
      if (!canvas) return;
      try {
        await Engine3D.init({ canvasConfig: { canvas } });
      } catch (e) {
        document.body.innerHTML =
          '<p style="padding:1rem;font-family:sans-serif">WebGPU 初始化失败，请使用 Chrome/Edge 并在 localhost 或 HTTPS 下打开。</p>';
        console.error(e);
        return;
      }

      const scene = new Scene3D();
      scene.addComponent(AtmosphericComponent);

      const camObj = new Object3D();
      const camera = camObj.addComponent(Camera3D);
      camera.perspective(55, canvas.clientWidth / Math.max(canvas.clientHeight, 1), 0.1, 200);
      const hover = camObj.addComponent(HoverCameraController);
      hover.setCamera(32, -38, -16);
      scene.addChild(camObj);

      const sun = new Object3D();
      const dl = sun.addComponent(DirectLight);
      dl.lightColor = new Color(1, 0.98, 0.95, 1);
      dl.intensity = 1.15;
      dl.castShadow = true;
      sun.transform.rotationX = -48;
      sun.transform.rotationY = 35;
      scene.addChild(sun);

      const ground = new Object3D();
      const gr = ground.addComponent(MeshRenderer);
      gr.geometry = new PlaneGeometry(18, 18, 1, 1);
      gr.material = new LitMaterial();
      gr.material.baseColor = new Color(0.22, 0.24, 0.28, 1);
      gr.receiveShadow = true;
      ground.transform.rotationX = -90;
      scene.addChild(ground);

      function addShape(name, x, geo, color) {
        const o = new Object3D();
        o.x = x;
        o.y = 0.75;
        const mr = o.addComponent(MeshRenderer);
        mr.geometry = geo;
        mr.material = new LitMaterial();
        mr.material.baseColor = color;
        mr.castShadow = true;
        scene.addChild(o);
        return name;
      }

      const names = [
        addShape('Box', -5.5, new BoxGeometry(1.1, 1.1, 1.1), new Color(0.85, 0.35, 0.28, 1)),
        addShape('Sphere', -1.8, new SphereGeometry(0.65, 32, 32), new Color(0.3, 0.65, 0.9, 1)),
        addShape('Cylinder', 1.8, new CylinderGeometry(0.55, 0.55, 1.3, 28), new Color(0.45, 0.8, 0.4, 1)),
        addShape('Torus', 5.5, new TorusGeometry(0.55, 0.18, 16, 48), new Color(0.95, 0.75, 0.25, 1)),
      ];

      const view = new View3D();
      view.scene = scene;
      view.camera = camera;
      Engine3D.startRenderView(view);

      window.addEventListener('resize', () => {
        camera.perspective(55, canvas.clientWidth / Math.max(canvas.clientHeight, 1), 0.1, 200);
      });

      function tick() {
        hud.textContent = names.join(' · ') + ' + PlaneGeometry(地面)';
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }
    main();
  </script>
</body>
</html>
