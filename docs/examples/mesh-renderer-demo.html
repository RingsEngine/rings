<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rings — MeshRenderer 演示</title>
  <style>
    html, body { margin: 0; height: 100%; width: 100%; overflow: hidden; }
    body { position: relative; font-family: system-ui, "Segoe UI", sans-serif; }
    #canvas { display: block; width: 100%; height: 100%; }
    .hud {
      position: absolute; left: 8px; top: 8px; right: 240px; pointer-events: none;
      font-size: 11px; line-height: 1.45; color: #e6edf3; text-shadow: 0 1px 3px #000;
      font-family: ui-monospace, monospace;
    }
    .controls {
      position: absolute; top: 0; right: 0; bottom: 0; width: 220px; padding: 10px;
      overflow: auto; background: rgba(15, 20, 25, 0.92); color: #e6edf3;
      font-size: 0.72rem; border-left: 1px solid #2d3a4d;
    }
    .controls h3 { margin: 0 0 8px; font-size: 0.75rem; color: #8b9cb3; font-weight: 600; }
    .row { margin-bottom: 8px; }
    .row label { display: block; margin-bottom: 2px; color: #8b9cb3; }
    .row input[type="range"] { width: 100%; }
    .row .val { float: right; color: #58a6ff; }
    .row input[type="checkbox"] { margin-right: 6px; }
  </style>
</head>
<body>
  <canvas id="canvas" style="width: 100%; height: 100%;"></canvas>
  <div class="hud" id="hud"></div>
  <aside class="controls">
    <h3>MeshRenderer</h3>
    <div class="row">
      <label><input type="checkbox" id="cast" checked /> castShadow（立方体）</label>
    </div>
    <div class="row">
      <label><input type="checkbox" id="recv" checked /> receiveShadow（地面）</label>
    </div>
    <div class="row">
      <label>roughness <span class="val" id="r-v">0.4</span></label>
      <input type="range" id="r" min="0" max="100" value="40" step="1" />
    </div>
    <p style="margin:10px 0 0;color:#8b9cb3;line-height:1.45"><code>geometry</code> + <code>material</code>（LitMaterial）挂在同一 <code>Object3D</code> 的 <code>MeshRenderer</code> 上。</p>
  </aside>
  <script type="module">
    import {
      Engine3D,
      Scene3D,
      Object3D,
      Camera3D,
      View3D,
      Color,
      LitMaterial,
      BoxGeometry,
      PlaneGeometry,
      MeshRenderer,
      AtmosphericComponent,
      DirectLight,
      HoverCameraController,
    } from 'https://unpkg.com/@rings-webgpu/core@1.0.52/dist/rings.es.js';

    async function main() {
      const canvas = document.getElementById('canvas');
      const hud = document.getElementById('hud');
      if (!canvas) return;
      try {
        await Engine3D.init({ canvasConfig: { canvas } });
      } catch (e) {
        document.body.innerHTML =
          '<p style="padding:1rem;font-family:sans-serif">WebGPU 初始化失败，请使用 Chrome/Edge 并在 localhost 或 HTTPS 下打开。</p>';
        console.error(e);
        return;
      }

      const scene = new Scene3D();
      scene.addComponent(AtmosphericComponent);

      const camObj = new Object3D();
      const camera = camObj.addComponent(Camera3D);
      camera.perspective(55, canvas.clientWidth / Math.max(canvas.clientHeight, 1), 0.1, 200);
      const hover = camObj.addComponent(HoverCameraController);
      hover.setCamera(28, -32, 12);
      scene.addChild(camObj);

      const sun = new Object3D();
      const dl = sun.addComponent(DirectLight);
      dl.lightColor = new Color(1, 0.97, 0.92, 1);
      dl.intensity = 1.2;
      dl.castShadow = true;
      sun.transform.rotationX = -50;
      sun.transform.rotationY = 28;
      scene.addChild(sun);

      const ground = new Object3D();
      const gr = ground.addComponent(MeshRenderer);
      gr.geometry = new PlaneGeometry(16, 16);
      gr.material = new LitMaterial();
      gr.material.baseColor = new Color(0.2, 0.22, 0.26, 1);
      gr.receiveShadow = true;
      ground.transform.rotationX = -90;
      scene.addChild(ground);

      const boxObj = new Object3D();
      const mr = boxObj.addComponent(MeshRenderer);
      mr.geometry = new BoxGeometry(1.4, 1.4, 1.4);
      mr.material = new LitMaterial();
      mr.material.baseColor = new Color(0.55, 0.72, 0.9, 1);
      mr.material.roughness = 0.4;
      mr.castShadow = true;
      boxObj.y = 0.7;
      scene.addChild(boxObj);

      const view = new View3D();
      view.scene = scene;
      view.camera = camera;
      Engine3D.startRenderView(view);

      const castEl = document.getElementById('cast');
      const recvEl = document.getElementById('recv');
      const rEl = document.getElementById('r');
      const rV = document.getElementById('r-v');

      function bind() {
        mr.castShadow = castEl.checked;
        gr.receiveShadow = recvEl.checked;
        const rv = Number(rEl.value) / 100;
        mr.material.roughness = rv;
        rV.textContent = rv.toFixed(2);
      }
      castEl.addEventListener('change', bind);
      recvEl.addEventListener('change', bind);
      rEl.addEventListener('input', bind);
      bind();

      window.addEventListener('resize', () => {
        camera.perspective(55, canvas.clientWidth / Math.max(canvas.clientHeight, 1), 0.1, 200);
      });

      function tick() {
        hud.textContent = `MeshRenderer · castShadow=${mr.castShadow} · ground.receiveShadow=${gr.receiveShadow} · roughness=${mr.material.roughness.toFixed(2)}`;
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }
    main();
  </script>
</body>
</html>
