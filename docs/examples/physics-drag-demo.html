<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rings — 物理：PhysicsDragger 拖拽</title>
  <script type="importmap">
    {
      "imports": {
        "@rings-webgpu/core": "https://unpkg.com/@rings-webgpu/core@1.0.52/dist/rings.es.js",
        "@rings-webgpu/physics": "../../packages/physics/dist/physics.es.js"
      }
    }
  </script>
  <style>
    html, body { margin: 0; height: 100%; width: 100%; overflow: hidden; }
    #canvas { display: block; width: 100%; height: 100%; }
    .hud {
      position: absolute; left: 8px; top: 8px; right: 8px; pointer-events: none;
      font-size: 11px; color: #e6edf3; text-shadow: 0 1px 3px #000;
      font-family: ui-monospace, monospace;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="hud">
    <code>Physics.init({ useDrag: true })</code> 启用 <code>PhysicsDragger</code>：在物体上按下并拖动（射线拾取刚体）。
  </div>
  <script type="module">
    import {
      Engine3D, Scene3D, Object3D, Camera3D, View3D, Color, Vector3,
      LitMaterial, BoxGeometry, MeshRenderer,
      AtmosphericComponent, DirectLight, HoverCameraController,
      ColliderComponent, BoxColliderShape,
    } from "@rings-webgpu/core";
    import { Physics, Rigidbody } from "@rings-webgpu/physics";

    async function main() {
      const canvas = document.getElementById("canvas");
      if (!canvas) return;

      try {
        await Engine3D.init({
          canvasConfig: { canvas },
          beforeRender: () => { if (Physics.isInited) Physics.update(); },
        });
      } catch (e) {
        document.body.innerHTML = "<p style=\"padding:1rem\">WebGPU 初始化失败。</p>";
        console.error(e);
        return;
      }

      await Physics.init({ useDrag: true });

      const scene = new Scene3D();
      scene.addComponent(AtmosphericComponent);

      const camObj = new Object3D();
      const camera = camObj.addComponent(Camera3D);
      camera.perspective(58, canvas.clientWidth / Math.max(canvas.clientHeight, 1), 0.1, 300);
      camObj.addComponent(HoverCameraController).setCamera(40, -32, 16);
      scene.addChild(camObj);

      const lightObj = new Object3D();
      lightObj.addComponent(DirectLight).intensity = 1.15;
      scene.addChild(lightObj);

      const ground = new Object3D();
      const gMr = ground.addComponent(MeshRenderer);
      gMr.geometry = new BoxGeometry(24, 0.25, 24);
      gMr.material = new LitMaterial();
      gMr.material.baseColor = new Color(0.24, 0.26, 0.3, 1);
      const gCol = ground.addComponent(ColliderComponent);
      gCol.shape.setFromCenterAndSize(new Vector3(0, 0, 0), new Vector3(24, 0.25, 24));
      const gRb = ground.addComponent(Rigidbody);
      gRb.mass = 0;
      scene.addChild(ground);

      for (let i = 0; i < 5; i++) {
        const o = new Object3D();
        o.x = (i - 2) * 1.1;
        o.y = 1.2 + i * 0.35;
        o.z = (i % 2) * 0.5;
        const mr = o.addComponent(MeshRenderer);
        mr.geometry = new BoxGeometry(0.65, 0.65, 0.65);
        mr.material = new LitMaterial();
        mr.material.baseColor = new Color(0.5 + i * 0.08, 0.45, 0.75 - i * 0.06, 1);
        const col = o.addComponent(ColliderComponent);
        col.shape = new BoxColliderShape();
        col.shape.setFromCenterAndSize(new Vector3(0, 0, 0), new Vector3(0.65, 0.65, 0.65));
        const rb = o.addComponent(Rigidbody);
        rb.mass = 0.8;
        scene.addChild(o);
      }

      const view = new View3D();
      view.scene = scene;
      view.camera = camera;
      Engine3D.startRenderView(view);
    }

    main().catch(console.error);
  </script>
  <p style="position:absolute;bottom:6px;left:8px;font-size:10px;color:#8b9cb3;margin:0">
    需 <code>npm run build:physics</code> + 仓库根目录 HTTP 访问。
  </p>
</body>
</html>
