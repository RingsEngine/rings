<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rings — 【对照】与 physics-basics-demo 相同</title>
  <style>
    html, body { margin: 0; height: 100%; width: 100%; overflow: hidden; }
    #canvas { display: block; width: 100%; height: 100%; }
    .hud {
      position: absolute; left: 8px; top: 8px; right: 8px; pointer-events: none;
      font-size: 11px; line-height: 1.45; color: #e6edf3; text-shadow: 0 1px 3px #000;
      font-family: ui-monospace, monospace;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "@rings-webgpu/core": "https://unpkg.com/@rings-webgpu/core@1.0.52/dist/rings.es.js",
      "@rings-webgpu/ammo": "https://unpkg.com/@rings-webgpu/ammo@0.2.1/ammo.js"
    }
  }
  </script>
</head>
<body>
  <canvas id="canvas" style="width: 100%; height: 100%;"></canvas>
  <div class="hud" id="hud">
    【本页与 physics-basics-demo.html 代码一致，仅改标题/HUD 便于对照 iframe】Physics.init + beforeRender → Physics.update；每 5 秒生成 5 个随机盒/球；每 20 秒清空上述掉落物（地面/相机/灯光保留）。计时用 performance.now() 秒增量。
  </div>
  <script type="module">
    import {
      Engine3D, Scene3D, Object3D, Camera3D, View3D, Color, Vector3,
      LitMaterial, BoxGeometry, SphereGeometry, PlaneGeometry, MeshRenderer,
      AtmosphericComponent, DirectLight, HoverCameraController,
      ColliderComponent, BoxColliderShape,
    } from 'https://unpkg.com/@rings-webgpu/core@1.0.52/dist/rings.es.js';
    import { Physics, Rigidbody,ContactProcessedUtil,CollisionShapeUtil } from 'https://unpkg.com/@rings-webgpu/physics@0.0.2/dist/physics.es.js';

    async function main() {
      console.log(ContactProcessedUtil,11111)
      const canvas = document.getElementById("canvas");
      if (!canvas) return;

      /** 秒；与 Time.delta（rAF 毫秒）无关，避免把 5 当成 5ms */
      const SPAWN_INTERVAL_SEC = 5;
      const SPAWN_BATCH = 5;
      const CLEAR_INTERVAL_SEC = 20;
      /** 会被定期清空的掉落物（不含地面/相机/灯光） */
      const disposableBodies = [];
      let spawnAccSec = 0;
      let clearAccSec = 0;
      let clockPrevMs = null;

      function clearDisposableBodies() {
        while (disposableBodies.length) {
          const o = disposableBodies.pop();
          if (o) {
            o.removeFromParent();
            o.destroy();
          }
        }
      }

      try {
        await Engine3D.init({
          canvasConfig: { canvas },
          beforeRender: () => {
            if (Physics.isInited) Physics.update();
            const nowMs = performance.now();
            if (clockPrevMs === null) {
              clockPrevMs = nowMs;
              return;
            }
            const dtSec = (nowMs - clockPrevMs) / 1000;
            clockPrevMs = nowMs;

            clearAccSec += dtSec;
            let clearedThisFrame = false;
            while (clearAccSec >= CLEAR_INTERVAL_SEC) {
              clearAccSec -= CLEAR_INTERVAL_SEC;
              clearDisposableBodies();
              clearedThisFrame = true;
              spawnAccSec = 0;
            }
            spawnAccSec += dtSec;
            if (!clearedThisFrame) {
              while (spawnAccSec >= SPAWN_INTERVAL_SEC) {
                spawnAccSec -= SPAWN_INTERVAL_SEC;
                for (let i = 0; i < SPAWN_BATCH; i++) {
                  spawnRandomBody(disposableBodies);
                }
              }
            }
          },
        });
      } catch (e) {
        document.body.innerHTML =
          "<p style=\"padding:1rem;font-family:sans-serif\">WebGPU 初始化失败，请使用 Chrome/Edge 并在 localhost 或 HTTPS 下打开。</p>";
        console.error(e);
        return;
      }

      await Physics.init({ useSoftBody: false, useDrag: false });

      const scene = new Scene3D();
      scene.addComponent(AtmosphericComponent);

      const camObj = new Object3D();
      const camera = camObj.addComponent(Camera3D);
      camera.perspective(60, canvas.clientWidth / Math.max(canvas.clientHeight, 1), 0.1, 500);
      camObj.addComponent(HoverCameraController).setCamera(50, -35, 18);
      scene.addChild(camObj);

      const lightObj = new Object3D();
      const light = lightObj.addComponent(DirectLight);
      light.lightColor = new Color(1, 1, 1, 1);
      light.intensity = 1.1;
      scene.addChild(lightObj);
      let groundPtr = null;
      let grouddPtrKb = null;

      function makeGround() {
        const g = new Object3D();
        const mr = g.addComponent(MeshRenderer);
        mr.geometry = new PlaneGeometry(40, 40, 1, 1);
        mr.material = new LitMaterial();
        mr.material.baseColor = new Color(0.22, 0.24, 0.28, 1);
        const col = g.addComponent(ColliderComponent);
        col.shape.setFromCenterAndSize(new Vector3(0, 0, 0), new Vector3(40, 0.2, 40));
        const rb = g.addComponent(Rigidbody);
        rb.shape = CollisionShapeUtil.createBoxShape(g);
        rb.mass = 0;
        scene.addChild(g);
        groundPtr = g;
        // console.log(rb.btRigidbody,44444)
        // grouddPtrKb = rb.btRigidbody.kB;
      }

     function dropBox(x, z) {
        const o = new Object3D();
        o.x = x;
        o.y = 8 + Math.random() * 4;
        o.z = z;
        const mr = o.addComponent(MeshRenderer);
        mr.geometry = new BoxGeometry(0.8, 0.8, 0.8);
        mr.material = new LitMaterial();
        mr.material.baseColor = new Color(0.85, 0.45, 0.2, 1);
        const col = o.addComponent(ColliderComponent);
        col.shape = new BoxColliderShape();
        col.shape.setFromCenterAndSize(new Vector3(0, 0, 0), new Vector3(0.8, 0.8, 0.8));
        const rb = o.addComponent(Rigidbody);
        rb.mass = 1;
        rb.shape = CollisionShapeUtil.createBoxShape(o);
        scene.addChild(o);
        return o;
      }

      function dropSphere(x, z) {
        const o = new Object3D();
        o.x = x;
        o.y = 10;
        o.z = z;
        const mr = o.addComponent(MeshRenderer);
        mr.geometry = new SphereGeometry(0.45, 24, 24);
        mr.material = new LitMaterial();
        mr.material.baseColor = new Color(0.3, 0.65, 0.9, 1);
        const col = o.addComponent(ColliderComponent);
        col.shape.setFromCenterAndSize(new Vector3(0, 0, 0), new Vector3(0.9, 0.9, 0.9));
        const rb = o.addComponent(Rigidbody);
        rb.shape = CollisionShapeUtil.createBoxShape(o);
        rb.mass = 0.8;
        scene.addChild(o);
        console.log(rb.btRigidbody,55555)
        // ContactProcessedUtil.registerCollisionCallback(grouddPtrKb, (cp, groundPtr.getComponent(Rigidbody), rb) => {
        //   // cp：btManifoldPoint；bodyA、bodyB：参与接触的两刚体
        //   console.log(cp)
        // });
        return o;
      }

      /** @param {Object3D[]} pool */
      function spawnRandomBody(pool) {
        const x = (Math.random() - 0.5) * 14;
        const z = (Math.random() - 0.5) * 14;
        const t = Math.random();
        let o;
        if (t < 0.55) {
          o = dropBox(x, z);
          o.getComponent(MeshRenderer).material.baseColor = new Color(
            0.45 + Math.random() * 0.5,
            0.35 + Math.random() * 0.45,
            0.2 + Math.random() * 0.35,
            1
          );
        } else {
          o = dropSphere(x, z);
          o.getComponent(MeshRenderer).material.baseColor = new Color(
            0.2 + Math.random() * 0.35,
            0.45 + Math.random() * 0.45,
            0.55 + Math.random() * 0.4,
            1
          );
        }
        pool.push(o);
      }

      makeGround();

      const view = new View3D();
      view.scene = scene;
      view.camera = camera;
      Engine3D.startRenderView(view);
    }

    main().catch(console.error);
  </script>
  <p style="position:absolute;bottom:6px;left:8px;right:8px;font-size:10px;color:#8b9cb3;margin:0">
    核心与物理从 <strong>unpkg</strong> 加载；请在 <strong>localhost</strong> 或 <strong>HTTPS</strong> 下通过 HTTP 服务打开（例如 <code>npx serve .</code>），勿用 <code>file://</code>。
  </p>
</body>
</html>
