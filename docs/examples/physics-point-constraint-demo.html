<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rings — 物理：点对点约束 PointToPointConstraint</title>
  <style>
    html, body { margin: 0; height: 100%; width: 100%; overflow: hidden; }
    body { position: relative; font-family: system-ui, "Segoe UI", sans-serif; }
    #canvas { display: block; width: 100%; height: 100%; }
    .hud {
      position: absolute; left: 8px; top: 8px; right: 220px; pointer-events: none;
      font-size: 11px; line-height: 1.45; color: #e6edf3; text-shadow: 0 1px 3px #000;
      font-family: ui-monospace, monospace;
    }
    .hint {
      position: absolute; top: 0; right: 0; bottom: 0; width: 200px; padding: 12px;
      background: rgba(15, 20, 25, 0.88); color: #c8d4e6; font-size: 0.72rem;
      line-height: 1.5; border-left: 1px solid #2d3a4d; pointer-events: none;
    }
    .hint h3 { margin: 0 0 8px; font-size: 0.75rem; color: #8b9cb3; font-weight: 600; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "@rings-webgpu/core": "https://unpkg.com/@rings-webgpu/core@1.0.52/dist/rings.es.js",
      "@rings-webgpu/ammo": "https://unpkg.com/@rings-webgpu/ammo@0.2.1/ammo.js"
    }
  }
  </script>
</head>
<body>
  <canvas id="canvas" style="width: 100%; height: 100%;"></canvas>
  <div class="hud">
    黄球为<strong>静态锚点</strong>，蓝球为<strong>动态</strong>，<code>PointToPointConstraint</code> 连接两球局部 <code>pivotSelf</code> / <code>pivotTarget</code>（球顶/球底附近），形成<strong>摆</strong>；不锁定相对旋转。
  </div>
  <aside class="hint">
    <h3>API 摘要</h3>
    <p><code>p2p.targetRigidbody = anchorRb</code></p>
    <p><code>p2p.pivotSelf</code>、<code>pivotTarget</code> 为两侧局部锚点；<code>rotationSelf/Target</code> 不参与本约束。</p>
    <p><strong>左键拖蓝球</strong>（<code>useDrag</code>）；空白转视角。</p>
  </aside>
  <script type="module">
    import {
      Engine3D, Scene3D, Object3D, Camera3D, View3D, Color, Vector3,
      LitMaterial, SphereGeometry, BoxGeometry, MeshRenderer,
      AtmosphericComponent, DirectLight, HoverCameraController,
    } from 'https://unpkg.com/@rings-webgpu/core@1.0.52/dist/rings.es.js';
    import { Physics, Rigidbody, PointToPointConstraint, CollisionShapeUtil } from 'https://unpkg.com/@rings-webgpu/physics@0.0.2/dist/physics.es.js';

    async function main() {
      const canvas = document.getElementById("canvas");
      if (!canvas) return;

      try {
        await Engine3D.init({
          canvasConfig: { canvas },
          beforeRender: () => {
            if (Physics.isInited) Physics.update();
          },
        });
      } catch (e) {
        document.body.innerHTML =
          "<p style=\"padding:1rem;font-family:sans-serif\">WebGPU 初始化失败。</p>";
        console.error(e);
        return;
      }

      await Physics.init({ useDrag: true });

      const scene = new Scene3D();
      const atm = scene.addComponent(AtmosphericComponent);
      atm.sunBrightness = 1.5;
      atm.sunRadiance = 18;

      const camObj = new Object3D();
      const camera = camObj.addComponent(Camera3D);
      camera.perspective(54, canvas.clientWidth / Math.max(canvas.clientHeight, 1), 0.1, 200);
      camObj.addComponent(HoverCameraController).setCamera(22, -32, 13);
      scene.addChild(camObj);

      const key = new Object3D();
      key.rotationX = 48;
      key.rotationY = -28;
      const kl = key.addComponent(DirectLight);
      kl.intensity = 1.75;
      kl.lightColor = new Color(1, 0.98, 0.94, 1);
      scene.addChild(key);

      const fill = new Object3D();
      fill.rotationX = 20;
      fill.rotationY = 145;
      const fl = fill.addComponent(DirectLight);
      fl.intensity = 0.5;
      fl.lightColor = new Color(0.78, 0.86, 1, 1);
      scene.addChild(fill);

      const ground = new Object3D();
      const gMr = ground.addComponent(MeshRenderer);
      gMr.geometry = new BoxGeometry(20, 0.22, 16);
      gMr.material = new LitMaterial();
      gMr.material.baseColor = new Color(0.24, 0.26, 0.3, 1);
      const gRb = ground.addComponent(Rigidbody);
      gRb.shape = CollisionShapeUtil.createBoxShape(ground);
      gRb.mass = 0;
      scene.addChild(ground);

      const rA = 0.45;
      const anchor = new Object3D();
      anchor.y = 5;
      const aMr = anchor.addComponent(MeshRenderer);
      aMr.geometry = new SphereGeometry(rA, 24, 24);
      aMr.material = new LitMaterial();
      aMr.material.baseColor = new Color(0.88, 0.82, 0.28, 1);
      aMr.material.metallic = 0.2;
      aMr.material.roughness = 0.45;
      const aRb = anchor.addComponent(Rigidbody);
      aRb.shape = CollisionShapeUtil.createSphereShape(anchor, rA);
      aRb.mass = 0;
      scene.addChild(anchor);

      const rB = 0.5;
      const bob = new Object3D();
      bob.y = 2.5;
      const bMr = bob.addComponent(MeshRenderer);
      bMr.geometry = new SphereGeometry(rB, 24, 24);
      bMr.material = new LitMaterial();
      bMr.material.baseColor = new Color(0.38, 0.62, 0.92, 1);
      bMr.material.metallic = 0.22;
      bMr.material.roughness = 0.42;
      const bRb = bob.addComponent(Rigidbody);
      bRb.shape = CollisionShapeUtil.createSphereShape(bob, rB);
      bRb.mass = 1.5;
      bRb.damping = [0.08, 0.12];

      /* btPoint2PointConstraint：两局部点在世界中重合；rotation* 不参与 */
      const p2p = bob.addComponent(PointToPointConstraint);
      p2p.targetRigidbody = aRb;
      p2p.pivotSelf = new Vector3(0, rB, 0);
      p2p.pivotTarget = new Vector3(0, -rA, 0);

      scene.addChild(bob);

      const view = new View3D();
      view.scene = scene;
      view.camera = camera;
      Engine3D.startRenderView(view);
    }

    main().catch(console.error);
  </script>
  <p style="position:absolute;bottom:6px;left:8px;right:220px;font-size:10px;color:#8b9cb3;margin:0">
    核心与物理自 <strong>unpkg</strong>；<code>CollisionShapeUtil.createSphereShape</code> 与网格半径一致。请用 HTTP 服务打开。
  </p>
</body>
</html>
