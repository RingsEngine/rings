<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rings — 物理：CollisionShapeUtil 形状</title>
  <script type="importmap">
    {
      "imports": {
        "@rings-webgpu/core": "https://unpkg.com/@rings-webgpu/core@1.0.52/dist/rings.es.js",
        "@rings-webgpu/physics": "../../packages/physics/dist/physics.es.js"
      }
    }
  </script>
  <style>
    html, body { margin: 0; height: 100%; width: 100%; overflow: hidden; }
    #canvas { display: block; width: 100%; height: 100%; }
    .hud {
      position: absolute; left: 8px; top: 8px; right: 8px; pointer-events: none;
      font-size: 11px; line-height: 1.45; color: #e6edf3; text-shadow: 0 1px 3px #000;
      font-family: ui-monospace, monospace;
    }
  </style>
</head>
<body>
  <canvas id="canvas" style="width: 100%; height: 100%;"></canvas>
  <div class="hud">
    使用 <code>Rigidbody.shape = CollisionShapeUtil.create*Shape(object3D)</code>，无需与 Collider 枚举一致；演示圆柱 / 球 / 盒。
  </div>
  <script type="module">
    import {
      Engine3D, Scene3D, Object3D, Camera3D, View3D, Color, Vector3,
      LitMaterial, BoxGeometry, SphereGeometry, CylinderGeometry, MeshRenderer,
      AtmosphericComponent, DirectLight, HoverCameraController,
    } from "@rings-webgpu/core";
    import { Physics, Rigidbody, CollisionShapeUtil } from "@rings-webgpu/physics";

    async function main() {
      const canvas = document.getElementById("canvas");
      if (!canvas) return;

      try {
        await Engine3D.init({
          canvasConfig: { canvas },
          beforeRender: () => { if (Physics.isInited) Physics.update(); },
        });
      } catch (e) {
        document.body.innerHTML =
          "<p style=\"padding:1rem\">WebGPU 初始化失败。</p>";
        console.error(e);
        return;
      }

      await Physics.init({});

      const scene = new Scene3D();
      scene.addComponent(AtmosphericComponent);

      const camObj = new Object3D();
      const camera = camObj.addComponent(Camera3D);
      camera.perspective(60, canvas.clientWidth / Math.max(canvas.clientHeight, 1), 0.1, 500);
      camObj.addComponent(HoverCameraController).setCamera(45, -40, 16);
      scene.addChild(camObj);

      const lightObj = new Object3D();
      lightObj.addComponent(DirectLight).lightColor = new Color(1, 1, 1, 1);
      scene.addChild(lightObj);

      const ground = new Object3D();
      const gMr = ground.addComponent(MeshRenderer);
      gMr.geometry = new BoxGeometry(24, 0.3, 24);
      gMr.material = new LitMaterial();
      gMr.material.baseColor = new Color(0.25, 0.27, 0.32, 1);
      const gRb = ground.addComponent(Rigidbody);
      gRb.shape = CollisionShapeUtil.createBoxShape(ground);
      gRb.mass = 0;
      scene.addChild(ground);

      function addShapeBody(geometry, color, x, z, shapeFn) {
        const o = new Object3D();
        o.x = x;
        o.y = 6;
        o.z = z;
        const mr = o.addComponent(MeshRenderer);
        mr.geometry = geometry;
        mr.material = new LitMaterial();
        mr.material.baseColor = color;
        const rb = o.addComponent(Rigidbody);
        rb.shape = shapeFn(o);
        rb.mass = 1.2;
        scene.addChild(o);
      }

      addShapeBody(
        new CylinderGeometry(0.5, 0.5, 1.2, 16, 4),
        new Color(0.9, 0.35, 0.35, 1),
        -2.5,
        0,
        (o) => CollisionShapeUtil.createCylinderShape(o)
      );
      addShapeBody(
        new SphereGeometry(0.55, 20, 20),
        new Color(0.35, 0.75, 0.4, 1),
        0,
        0,
        (o) => CollisionShapeUtil.createSphereShape(o)
      );
      addShapeBody(
        new BoxGeometry(1, 0.6, 1.4),
        new Color(0.4, 0.45, 0.95, 1),
        2.5,
        0,
        (o) => CollisionShapeUtil.createBoxShape(o)
      );

      const view = new View3D();
      view.scene = scene;
      view.camera = camera;
      Engine3D.startRenderView(view);
    }

    main().catch(console.error);
  </script>
  <p style="position:absolute;bottom:6px;left:8px;font-size:10px;color:#8b9cb3;margin:0">
    需 <code>npm run build:physics</code> + 从仓库根目录 HTTP 访问。
  </p>
</body>
</html>
