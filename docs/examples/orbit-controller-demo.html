<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rings — OrbitController 演示（可运行示例）</title>
  <style>
    html, body { margin: 0; height: 100%; width: 100%; overflow: hidden; }
    body { position: relative; font-family: system-ui, "Segoe UI", sans-serif; }
    #canvas { display: block; width: 100%; height: 100%; }
    .hud {
      position: absolute; left: 8px; top: 8px; right: 220px; pointer-events: none;
      font-size: 11px; line-height: 1.45; color: #e6edf3; text-shadow: 0 1px 3px #000;
      font-family: ui-monospace, monospace;
    }
    .controls {
      position: absolute; top: 0; right: 0; bottom: 0; width: 200px; padding: 10px;
      overflow: auto; background: rgba(15, 20, 25, 0.92); color: #e6edf3;
      font-size: 0.78rem; border-left: 1px solid #2d3a4d;
    }
    .controls h3 { margin: 0 0 8px; font-size: 0.8rem; color: #8b9cb3; font-weight: 600; }
    .row { margin-bottom: 10px; }
    .row label { display: block; margin-bottom: 3px; color: #8b9cb3; }
    .row input[type="range"] { width: 100%; }
    .row .val { float: right; color: #58a6ff; }
    .row label.chk { display: flex; align-items: center; gap: 8px; cursor: pointer; color: #e6edf3; }
    @media (max-width: 520px) {
      .hud { right: 8px; }
      .controls { width: 100%; height: auto; max-height: 45%; top: auto; left: 0; border-left: none; border-top: 1px solid #2d3a4d; }
    }
  </style>
</head>
<body>
  <canvas id="canvas" style="width: 100%; height: 100%;"></canvas>
  <div class="hud" id="hud"></div>
  <aside class="controls">
    <h3>OrbitController</h3>
    <div class="row">
      <label>minDistance <span class="val" id="min-val">2.0</span></label>
      <input type="range" id="min" min="10" max="80" value="20" step="1" />
    </div>
    <div class="row">
      <label>maxDistance <span class="val" id="max-val">80</span></label>
      <input type="range" id="max" min="40" max="200" value="80" step="5" />
    </div>
    <div class="row">
      <label class="chk"><input type="checkbox" id="auto" /> autoRotate</label>
    </div>
    <div class="row">
      <label>autoRotateSpeed <span class="val" id="speed-val">0.10</span></label>
      <input type="range" id="speed" min="2" max="30" value="10" step="1" />
    </div>
    <p style="margin:8px 0 0;color:#8b9cb3;line-height:1.45">
      <strong>左键</strong>旋转轨道，<strong>右键</strong>平移目标，<strong>滚轮</strong>缩放。距离见 <code>spherical.radius</code>。初始相机 <code>(0,10,20)</code> 相对 <code>target (0,0,0)</code>。
    </p>
  </aside>

  <script type="module">
    import {
      Engine3D,
      Scene3D,
      Object3D,
      Camera3D,
      View3D,
      Vector3,
      LitMaterial,
      BoxGeometry,
      SphereGeometry,
      PlaneGeometry,
      MeshRenderer,
      AtmosphericComponent,
      DirectLight,
      OrbitController,
      Color,
    } from 'https://unpkg.com/@rings-webgpu/core@1.0.52/dist/rings.es.js';

    function fmt(v) {
      return `${v.x.toFixed(2)}, ${v.y.toFixed(2)}, ${v.z.toFixed(2)}`;
    }

    async function main() {
      const canvas = document.getElementById('canvas');
      const hud = document.getElementById('hud');
      if (!canvas) throw new Error('缺少 #canvas');

      try {
        await Engine3D.init({ canvasConfig: { canvas } });
      } catch (e) {
        document.body.innerHTML =
          '<p style="padding:1rem;font-family:sans-serif">WebGPU 初始化失败，请使用 Chrome/Edge 最新版并在 localhost 或 HTTPS 下打开。</p>';
        console.error(e);
        return;
      }

      const scene = new Scene3D();
      const sky = scene.addComponent(AtmosphericComponent);
      sky.sunY = 0.6;
      sky.sunZ = 0.8;

      const cameraObj = new Object3D();
      const camera = cameraObj.addComponent(Camera3D);
      camera.perspective(60, canvas.clientWidth / Math.max(canvas.clientHeight, 1), 0.1, 1000);

      cameraObj.transform.localPosition = new Vector3(0, 10, 20);

      const orbit = cameraObj.addComponent(OrbitController);
      orbit.target = new Vector3(0, 0, 0);
      orbit.minDistance = 2;
      orbit.maxDistance = 80;
      orbit.autoRotate = false;
      orbit.autoRotateSpeed = 0.1;

      scene.addChild(cameraObj);

      const lightObj = new Object3D();
      const light = lightObj.addComponent(DirectLight);
      light.lightColor = new Color(1, 1, 1, 1);
      light.intensity = 1.2;
      light.castShadow = true;
      scene.addChild(lightObj);

      const ground = new Object3D();
      const groundR = ground.addComponent(MeshRenderer);
      groundR.geometry = new PlaneGeometry(10, 10);
      groundR.material = new LitMaterial();
      groundR.material.baseColor = new Color(0.3, 0.3, 0.3, 1);
      groundR.receiveShadow = true;
      scene.addChild(ground);

      const box = new Object3D();
      const boxR = box.addComponent(MeshRenderer);
      boxR.geometry = new BoxGeometry(1, 1, 1);
      boxR.material = new LitMaterial();
      boxR.material.baseColor = new Color(0.8, 0.2, 0.2, 1);
      boxR.castShadow = true;
      box.y = 0.5;
      scene.addChild(box);

      const sphere = new Object3D();
      const sphereR = sphere.addComponent(MeshRenderer);
      sphereR.geometry = new SphereGeometry(0.5, 32, 32);
      sphereR.material = new LitMaterial();
      sphereR.material.baseColor = new Color(0.2, 0.8, 0.2, 1);
      sphereR.castShadow = true;
      sphere.x = 2;
      sphere.y = 0.5;
      scene.addChild(sphere);

      const view = new View3D();
      view.scene = scene;
      view.camera = camera;
      Engine3D.startRenderView(view);

      const minEl = document.getElementById('min');
      const minVal = document.getElementById('min-val');
      const maxEl = document.getElementById('max');
      const maxVal = document.getElementById('max-val');
      const autoEl = document.getElementById('auto');
      const speedEl = document.getElementById('speed');
      const speedVal = document.getElementById('speed-val');

      function bindSliders() {
        orbit.minDistance = Number(minEl.value) / 10;
        orbit.maxDistance = Number(maxEl.value);
        orbit.autoRotate = autoEl.checked;
        orbit.autoRotateSpeed = Number(speedEl.value) / 100;
        minVal.textContent = orbit.minDistance.toFixed(1);
        maxVal.textContent = String(orbit.maxDistance);
        speedVal.textContent = orbit.autoRotateSpeed.toFixed(2);
      }
      minEl.addEventListener('input', bindSliders);
      maxEl.addEventListener('input', bindSliders);
      autoEl.addEventListener('change', bindSliders);
      speedEl.addEventListener('input', bindSliders);
      bindSliders();

      window.addEventListener('resize', () => {
        camera.perspective(
          60,
          canvas.clientWidth / Math.max(canvas.clientHeight, 1),
          0.1,
          1000
        );
      });

      function tick() {
        const r = orbit.spherical.radius;
        hud.innerHTML =
          `<div><b>target</b> ${fmt(orbit.target)}</div>` +
          `<div><b>spherical.radius</b> ${r.toFixed(2)}（滚轮缩放）</div>` +
          `<div><b>minDistance</b> ${orbit.minDistance.toFixed(2)} · <b>maxDistance</b> ${orbit.maxDistance}</div>` +
          `<div><b>autoRotate</b> ${orbit.autoRotate} · <b>speed</b> ${orbit.autoRotateSpeed.toFixed(2)}</div>` +
          `<div><b>相机 localPosition</b> ${fmt(cameraObj.transform.localPosition)}</div>`;
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    main();
  </script>
</body>
</html>
