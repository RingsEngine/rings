<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Rings Documentation</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta
      name="description"
      content="Documentation for Rings WebGPU framework"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0"
    />
    <link
      rel="stylesheet"
      href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"
    />
    <link rel="stylesheet" href="custom.css" />
  </head>
  <body>
    <div id="app"></div>
    <script>
      window.$docsify = {
        name: "Rings",
        repo: "",
        loadSidebar: true,
        subMaxLevel: 2,
        auto2top: true,
        homepage: "README.md",
        search: {
          maxAge: 86400000, // 过期时间，单位毫秒，默认一天
          paths: "auto",
          placeholder: "Type to search",
          noData: "No Results!",
          depth: 6,
        },
        plugins: [
          function iframeResolvePlugin(hook) {
            hook.doneEach(function () {
              document
                .querySelectorAll(".markdown-section iframe[src]")
                .forEach(function (el) {
                  var s = el.getAttribute("src");
                  if (!s || /^(https?:|\/\/|data:|blob:)/i.test(s)) return;
                  try {
                    el.src = new URL(s, window.location.href).href;
                  } catch (e) {}
                });
            });
          },
          /** 侧栏顶级分组可折叠：显式按钮 + 正确解析根 ul（勿用 querySelector('ul') 误命中嵌套列表） */
          function sidebarGroupCollapsePlugin(hook) {
            function sidebarRootUl() {
              var nav = document.querySelector(".sidebar-nav");
              if (!nav) return null;
              var i, ch, k, kid;
              for (i = 0; i < nav.children.length; i++) {
                ch = nav.children[i];
                if (ch && ch.tagName === "UL") return ch;
              }
              for (i = 0; i < nav.children.length; i++) {
                ch = nav.children[i];
                if (!ch || (ch.tagName !== "DIV" && ch.tagName !== "SECTION"))
                  continue;
                for (k = 0; k < ch.children.length; k++) {
                  kid = ch.children[k];
                  if (kid && kid.tagName === "UL") return kid;
                }
              }
              return null;
            }
            /** 一级 li 下的「页面 TOC / 子侧栏」ul：含直接子 ul 或包在 div 等内的 ul（Docsify subMaxLevel 异步注入） */
            function firstSubmenuUl(li) {
              var i, ch, u;
              for (i = 0; i < li.children.length; i++) {
                ch = li.children[i];
                if (!ch) continue;
                if (
                  ch.classList &&
                  (ch.classList.contains("rings-sidebar-caret-btn") ||
                    ch.classList.contains("rings-sidebar-row"))
                )
                  continue;
                if (ch.tagName === "UL") return ch;
              }
              for (i = 0; i < li.children.length; i++) {
                ch = li.children[i];
                if (!ch || ch.tagName === "UL") continue;
                if (
                  ch.classList &&
                  (ch.classList.contains("rings-sidebar-caret-btn") ||
                    ch.classList.contains("rings-sidebar-row"))
                )
                  continue;
                if (ch.querySelector) {
                  u = ch.querySelector("ul");
                  if (u) return u;
                }
              }
              u = li.querySelector("ul.app-sub-sidebar");
              if (u) return u;
              return null;
            }
            function stripSidebarCaret(li) {
              var uls = li.querySelectorAll("ul.rings-sidebar-sub-folded");
              var k;
              for (k = 0; k < uls.length; k++)
                uls[k].classList.remove("rings-sidebar-sub-folded");
              var b = findCaretBtn(li);
              if (b) b.remove();
              unwrapTitleRow(li);
              li.classList.remove(
                "rings-sidebar-group",
                "rings-sidebar-leaf",
                "rings-sidebar-folded"
              );
              delete li.dataset.ringsSidebarCaret;
            }
            /** Docsify 会重写侧栏 innerHTML：可能留下 data 但按钮已丢，或 TOC 晚注入后仍带 leaf/disabled */
            function resetStaleSidebarCarets(topLis) {
              var j, li, btn, sub;
              for (j = 0; j < topLis.length; j++) {
                li = topLis[j];
                if (!li || li.tagName !== "LI") continue;
                if (li.dataset.ringsSidebarCaret !== "1") continue;
                btn = findCaretBtn(li);
                sub = firstSubmenuUl(li);
                if (!btn) {
                  stripSidebarCaret(li);
                  continue;
                }
                if (
                  sub &&
                  (li.classList.contains("rings-sidebar-leaf") || btn.disabled)
                )
                  stripSidebarCaret(li);
              }
            }
            /** 无链接的一级标题（如「API」「类」）：Docsify 常为 p/span，无 <a> */
            function plainTitleBlock(li) {
              var i, ch, tn;
              for (i = 0; i < li.children.length; i++) {
                ch = li.children[i];
                if (!ch || ch.nodeType !== 1) continue;
                tn = ch.tagName;
                if (tn === "UL") break;
                if (
                  ch.classList &&
                  (ch.classList.contains("rings-sidebar-caret-btn") ||
                    ch.classList.contains("rings-sidebar-row"))
                )
                  continue;
                if (tn === "A") continue;
                if (ch.querySelector && ch.querySelector("a")) continue;
                if (
                  tn === "P" ||
                  tn === "SPAN" ||
                  tn === "STRONG" ||
                  tn === "H3" ||
                  tn === "H4"
                )
                  return ch;
              }
              return null;
            }
            /** 一级标题 DOM 块：有链接用 link 块，否则纯文本块 */
            function titleRowBlock(li) {
              var link = firstNavLink(li);
              if (link) return titleBlockForNavLink(li, link);
              return plainTitleBlock(li);
            }
            /** 一级侧栏标题块：从 link 向上直到 li，遇 rings-sidebar-row 则停 */
            function titleBlockForNavLink(li, link) {
              if (!link) return null;
              var el = link;
              while (el.parentNode && el.parentNode !== li) {
                if (
                  el.parentNode.classList &&
                  el.parentNode.classList.contains("rings-sidebar-row")
                )
                  break;
                el = el.parentNode;
              }
              return el;
            }
            function findTitleRow(li) {
              var i, ch;
              for (i = 0; i < li.children.length; i++) {
                ch = li.children[i];
                if (
                  ch &&
                  ch.tagName === "SPAN" &&
                  ch.classList &&
                  ch.classList.contains("rings-sidebar-row")
                )
                  return ch;
              }
              return null;
            }
            function unwrapTitleRow(li) {
              var row = findTitleRow(li);
              if (!row) return;
              while (row.firstChild) li.insertBefore(row.firstChild, row);
              row.remove();
            }
            /** 标题 + 三角包进同一行，子菜单始终在 li 下、行外，避免展开后整段沉到侧栏底部 */
            function ensureTitleRow(li) {
              var block = titleRowBlock(li);
              var btn = findCaretBtn(li);
              if (!block || !btn) return;
              var row = findTitleRow(li);
              if (!row) {
                row = document.createElement("span");
                row.className = "rings-sidebar-row";
                li.insertBefore(row, block);
                row.appendChild(block);
                row.appendChild(btn);
              } else {
                if (block.parentNode !== row) row.insertBefore(block, row.firstChild);
                if (btn.parentNode !== row) row.appendChild(btn);
              }
              var i, ch;
              for (i = row.children.length - 1; i >= 0; i--) {
                ch = row.children[i];
                if (!ch || ch === block || ch === btn) continue;
                if (ch.contains && block && ch.contains(block)) continue;
                li.insertBefore(ch, row.nextSibling);
              }
              var ulsInRow = row.querySelectorAll(":scope > ul");
              var ui, ulm;
              for (ui = 0; ui < ulsInRow.length; ui++) {
                ulm = ulsInRow[ui];
                if (ulm && ulm.parentNode === row)
                  li.insertBefore(ulm, row.nextSibling);
              }
            }
            /** 三角必须为 li 的直接子节点（flex）；ul 在包装层内时插在包装层之前（无可用 link 时兜底） */
            function placeCaretBeforeSubmenu(li, btn, sub) {
              if (!sub) {
                li.appendChild(btn);
                return;
              }
              if (sub.parentNode === li) {
                li.insertBefore(btn, sub);
                return;
              }
              var anc = sub.parentNode;
              while (anc && anc !== li) {
                if (anc.parentNode === li) {
                  li.insertBefore(btn, anc);
                  return;
                }
                anc = anc.parentNode;
              }
              li.appendChild(btn);
            }
            function firstNavLink(li) {
              var row = findTitleRow(li);
              var i, ch, a;
              if (row) {
                a = row.querySelector("a");
                if (a) return a;
              }
              for (i = 0; i < li.children.length; i++) {
                ch = li.children[i];
                if (ch.tagName === "A") return ch;
              }
              for (i = 0; i < li.children.length; i++) {
                ch = li.children[i];
                if (ch.tagName === "P") {
                  a = ch.querySelector("a");
                  if (a) return a;
                }
              }
              for (i = 0; i < li.children.length; i++) {
                ch = li.children[i];
                if (ch.tagName === "DIV") {
                  a = ch.querySelector("a");
                  if (a) return a;
                }
              }
              return null;
            }
            function findCaretBtn(li) {
              var row = findTitleRow(li);
              var i, ch;
              if (row) {
                for (i = 0; i < row.children.length; i++) {
                  ch = row.children[i];
                  if (
                    ch &&
                    ch.classList &&
                    ch.classList.contains("rings-sidebar-caret-btn")
                  )
                    return ch;
                }
              }
              for (i = 0; i < li.children.length; i++) {
                ch = li.children[i];
                if (
                  ch &&
                  ch.classList &&
                  ch.classList.contains("rings-sidebar-caret-btn")
                )
                  return ch;
              }
              return null;
            }
            /** 当前路由高亮 a 所在的一级 li（仅根 ul 下） */
            function getHostTopLevelLi(root) {
              var activeA = root.querySelector("a.active");
              if (!activeA) return null;
              var el = activeA;
              while (el && el.parentNode && el.parentNode !== root) {
                el = el.parentNode;
              }
              if (
                !el ||
                el.tagName !== "LI" ||
                !el.classList.contains("rings-sidebar-group")
              )
                return null;
              return el;
            }
            function sidebarFoldStorageKey(li) {
              var a = firstNavLink(li);
              if (a) {
                var h = (a.getAttribute("href") || "").trim();
                if (!h) return "";
                var i = h.indexOf("#");
                if (i >= 0) h = h.slice(0, i);
                return "ringsDocSbFold:" + h;
              }
              var pb = plainTitleBlock(li);
              if (pb) {
                var t = (pb.textContent || "").trim().replace(/\s+/g, " ");
                if (t) return "ringsDocSbFold:@t:" + t.slice(0, 48);
              }
              return "";
            }
            function saveSidebarFoldPreference(li) {
              try {
                var k = sidebarFoldStorageKey(li);
                if (!k) return;
                if (li.classList.contains("rings-sidebar-folded"))
                  sessionStorage.setItem(k, "1");
                else sessionStorage.removeItem(k);
              } catch (e) {}
            }
            function setFoldUi(li, folded) {
              var sub = firstSubmenuUl(li);
              var b = findCaretBtn(li);
              if (folded) {
                li.classList.add("rings-sidebar-folded");
                if (sub) sub.classList.add("rings-sidebar-sub-folded");
                if (b) {
                  b.setAttribute("aria-expanded", "false");
                  b.textContent = "\u25b8";
                }
              } else {
                li.classList.remove("rings-sidebar-folded");
                if (sub) sub.classList.remove("rings-sidebar-sub-folded");
                if (b) {
                  b.setAttribute("aria-expanded", "true");
                  b.textContent = "\u25be";
                }
              }
            }
            /** 非 host：仅当 session 标记为折叠时才 setFoldUi(true)；绝不主动 setFoldUi(false)，否则 tick 高频会把其它组强行展开 */
            function applySidebarFoldPersistence() {
              var root = sidebarRootUl();
              if (!root) return;
              var hostLi = getHostTopLevelLi(root);
              var topLis = root.children;
              var j, li, k;
              for (j = 0; j < topLis.length; j++) {
                li = topLis[j];
                if (
                  !li ||
                  li.tagName !== "LI" ||
                  !li.classList.contains("rings-sidebar-group")
                )
                  continue;
                k = sidebarFoldStorageKey(li);
                if (!k) continue;
                if (hostLi && li === hostLi) continue;
                try {
                  if (sessionStorage.getItem(k) === "1") setFoldUi(li, true);
                } catch (e) {}
              }
            }
            var RINGS_SIDEBAR_LAST_HOST_KEY = "ringsDocSbLastHostHref";
            /** 换页后：仅当「当前一级」相对上次变化时强制展开 host（同页内 hash 变化不冲掉用户折叠） */
            function expandActiveHostGroup() {
              var root = sidebarRootUl();
              if (!root) return;
              var hostLi = getHostTopLevelLi(root);
              if (!hostLi) return;
              var curKey = sidebarFoldStorageKey(hostLi);
              var last = "";
              try {
                last = sessionStorage.getItem(RINGS_SIDEBAR_LAST_HOST_KEY) || "";
              } catch (e) {}
              if (!curKey || curKey !== last) setFoldUi(hostLi, false);
              try {
                sessionStorage.setItem(RINGS_SIDEBAR_LAST_HOST_KEY, curKey || last);
              } catch (e2) {}
            }
            function ensureCarets() {
              var root = sidebarRootUl();
              if (!root) return;
              var topLis = root.children;
              var j, li, sub, link, btn;
              resetStaleSidebarCarets(topLis);
              for (j = 0; j < topLis.length; j++) {
                li = topLis[j];
                if (!li || li.tagName !== "LI") continue;
                if (li.dataset.ringsSidebarCaret === "1") continue;
                sub = firstSubmenuUl(li);
                link = firstNavLink(li);
                /* 一级项：有子菜单或有一级链接即显示三角；点击时再判断是否有可折叠 ul（避免 TOC 晚注入时误 disabled） */
                if (!sub && !link) continue;
                li.dataset.ringsSidebarCaret = "1";
                li.classList.add("rings-sidebar-group");
                var btn = document.createElement("button");
                btn.type = "button";
                btn.className = "rings-sidebar-caret-btn";
                btn.textContent = "\u25be";
                btn.setAttribute("aria-expanded", "true");
                btn.setAttribute("aria-label", "折叠或展开子菜单");
                btn.title = "折叠/展开";
                /* var 循环闭包：必须用 IIFE 绑定当前 li / btn，否则所有按钮都操作最后一项 */
                (function (liNode, btnNode) {
                  btnNode.addEventListener("click", function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                    function applyFoldToggle(sub) {
                      var folded = liNode.classList.toggle("rings-sidebar-folded");
                      sub.classList.toggle("rings-sidebar-sub-folded", folded);
                      btnNode.setAttribute(
                        "aria-expanded",
                        folded ? "false" : "true"
                      );
                      btnNode.textContent = folded ? "\u25b8" : "\u25be";
                      saveSidebarFoldPreference(liNode);
                    }
                    function syncExpandedUi(sub) {
                      liNode.classList.remove("rings-sidebar-folded");
                      sub.classList.remove("rings-sidebar-sub-folded");
                      btnNode.setAttribute("aria-expanded", "true");
                      btnNode.textContent = "\u25be";
                      saveSidebarFoldPreference(liNode);
                    }
                    var subEl = firstSubmenuUl(liNode);
                    if (subEl) {
                      applyFoldToggle(subEl);
                      return;
                    }
                    /* subMaxLevel 的 TOC 挂在「当前 active 的 a」的 parent 上；未点过标题时可能尚未注入 */
                    var le = firstNavLink(liNode);
                    if (!le) return;
                    le.click();
                    var n = 0;
                    function poll() {
                      if (!liNode || !liNode.isConnected) return;
                      subEl = firstSubmenuUl(liNode);
                      if (subEl) {
                        syncExpandedUi(subEl);
                        return;
                      }
                      if (++n < 30) setTimeout(poll, 40);
                    }
                    setTimeout(poll, 40);
                  });
                })(li, btn);
                li.appendChild(btn);
                if (titleRowBlock(li)) ensureTitleRow(li);
                else placeCaretBeforeSubmenu(li, btn, sub);
              }
              /* Docsify 可能改写 li；每轮把标题与三角收回 rings-sidebar-row */
              for (j = 0; j < topLis.length; j++) {
                li = topLis[j];
                if (!li || li.tagName !== "LI") continue;
                if (li.dataset.ringsSidebarCaret !== "1") continue;
                btn = findCaretBtn(li);
                if (!btn) continue;
                if (titleRowBlock(li)) ensureTitleRow(li);
              }
            }
            var ringsFoldApplyMinMs = 100;
            var ringsFoldApplyLastTs = 0;
            function tick() {
              ensureCarets();
              var now = Date.now();
              if (now - ringsFoldApplyLastTs >= ringsFoldApplyMinMs) {
                ringsFoldApplyLastTs = now;
                applySidebarFoldPersistence();
              }
            }
            /** 换页或首屏：当前一级展开 + 按 session 恢复其它一级折叠 */
            function tickAfterRoute() {
              ensureCarets();
              expandActiveHostGroup();
              applySidebarFoldPersistence();
              ringsFoldApplyLastTs = Date.now();
            }
            function observeSidebar() {
              var side =
                document.querySelector("aside.sidebar") ||
                document.querySelector(".sidebar");
              if (!side || side.dataset.ringsSidebarMo === "1") return;
              side.dataset.ringsSidebarMo = "1";
              var t = null;
              var mo = new MutationObserver(function () {
                clearTimeout(t);
                t = setTimeout(tick, 20);
              });
              mo.observe(side, { childList: true, subtree: true });
            }
            var pollId = null;
            function startPoll() {
              if (pollId != null) return;
              var n = 0;
              pollId = setInterval(function () {
                tick();
                n++;
                if (n > 50) {
                  clearInterval(pollId);
                  pollId = null;
                }
              }, 100);
            }
            hook.mounted(function () {
              observeSidebar();
              tickAfterRoute();
              startPoll();
              setTimeout(tickAfterRoute, 0);
              setTimeout(tick, 60);
              setTimeout(tick, 250);
            });
            hook.ready(function () {
              tickAfterRoute();
              startPoll();
              setTimeout(tickAfterRoute, 0);
              setTimeout(tick, 150);
              setTimeout(tick, 600);
            });
            hook.doneEach(function () {
              tickAfterRoute();
              setTimeout(tick, 0);
              setTimeout(tick, 80);
              setTimeout(tick, 400);
            });
            window.addEventListener("load", function () {
              tickAfterRoute();
              startPoll();
            });
          },
        ],
      };
    </script>

    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  </body>
</html>
