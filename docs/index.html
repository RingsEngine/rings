<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Rings Documentation</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta
      name="description"
      content="Documentation for Rings WebGPU framework"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0"
    />
    <link
      rel="stylesheet"
      href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"
    />
    <link rel="stylesheet" href="custom.css" />
  </head>
  <body>
    <div id="app"></div>
    <script>
      window.$docsify = {
        name: "Rings",
        repo: "",
        loadSidebar: "sidebar.md",
        alias: {
          "/.*/sidebar.md": "/sidebar.md",
        },
        subMaxLevel: 2,
        auto2top: true,
        homepage: "README.md",
        search: {
          maxAge: 86400000, // 过期时间，单位毫秒，默认一天
          paths: "auto",
          placeholder: "Type to search",
          noData: "No Results!",
          depth: 6,
        },
        plugins: [
          function iframeResolvePlugin(hook) {
            hook.doneEach(function () {
              document
                .querySelectorAll(".markdown-section iframe[src]")
                .forEach(function (el) {
                  var s = el.getAttribute("src");
                  if (!s || /^(https?:|\/\/|data:|blob:)/i.test(s)) return;
                  try {
                    var resolved = new URL(s, window.location.href).href;
                    if (el.src !== resolved) el.src = resolved;
                  } catch (e) {}
                });
            });
          },
          /** 侧栏顶级分组：点击标题展开/收起（无三角按钮） */
          function sidebarGroupCollapsePlugin(hook) {
            /** Docsify 侧栏常有多个 ul：第一个是站点名，真正导航在 li 最多的那个 ul */
            function sidebarRootUl() {
              var nav = document.querySelector(".sidebar-nav");
              if (!nav) return null;
              var best = null;
              var bestN = 0;
              var i, ul, j, li, n;
              for (i = 0; i < nav.children.length; i++) {
                ul = nav.children[i];
                if (!ul || ul.tagName !== "UL") continue;
                n = 0;
                for (j = 0; j < ul.children.length; j++) {
                  li = ul.children[j];
                  if (li && li.tagName === "LI") n++;
                }
                if (n > bestN) {
                  bestN = n;
                  best = ul;
                }
              }
              return best;
            }
            function cleanupLegacyCarets(root) {
              var btns = root.querySelectorAll(".rings-sidebar-caret-btn");
              var i, b, row, li;
              for (i = 0; i < btns.length; i++) btns[i].remove();
              var rows = root.querySelectorAll("li > .rings-sidebar-row");
              for (i = 0; i < rows.length; i++) {
                row = rows[i];
                li = row.parentNode;
                if (!li || li.tagName !== "LI") continue;
                while (row.firstChild) li.insertBefore(row.firstChild, row);
                row.remove();
              }
            }
            /** 无链接的一级标题（如「API」「类」） */
            function plainTitleBlock(li) {
              var i, ch, tn;
              for (i = 0; i < li.children.length; i++) {
                ch = li.children[i];
                if (!ch || ch.nodeType !== 1) continue;
                tn = ch.tagName;
                if (tn === "UL") break;
                if (tn === "A") continue;
                if (ch.querySelector && ch.querySelector("a")) continue;
                if (
                  tn === "P" ||
                  tn === "SPAN" ||
                  tn === "STRONG" ||
                  tn === "H3" ||
                  tn === "H4"
                )
                  return ch;
              }
              return null;
            }
            /** 一级标题链接（li 直接子级 a 或 p/div 内首个 a） */
            function firstNavLink(li) {
              var i, ch, a;
              for (i = 0; i < li.children.length; i++) {
                ch = li.children[i];
                if (ch && ch.tagName === "A") return ch;
              }
              for (i = 0; i < li.children.length; i++) {
                ch = li.children[i];
                if (!ch) continue;
                if (ch.tagName === "P" || ch.tagName === "DIV") {
                  a = ch.querySelector("a");
                  if (a) return a;
                }
              }
              return null;
            }
            function titleClickTarget(li) {
              return firstNavLink(li) || plainTitleBlock(li);
            }
            /** 当前路由高亮 a 所在的一级 li（仅根 ul 下） */
            function getHostTopLevelLi(root) {
              var activeA = document.querySelector(".sidebar-nav a.active");
              if (!activeA || !root) return null;
              var el = activeA;
              while (el && el.parentNode && el.parentNode !== root) {
                el = el.parentNode;
              }
              if (!el || el.tagName !== "LI") return null;
              return el;
            }
            function sidebarFoldStorageKey(li) {
              var label = topLevelGroupLabel(li);
              if (label) return "ringsDocSbFold:@label:" + label.slice(0, 48);
              var a = firstNavLink(li);
              if (a) {
                var h = (a.getAttribute("href") || "").trim();
                if (!h) return "";
                var i = h.indexOf("#");
                if (i >= 0) h = h.slice(0, i);
                return "ringsDocSbFold:" + h;
              }
              var pb = plainTitleBlock(li);
              if (pb) {
                var t = (pb.textContent || "").trim().replace(/\s+/g, " ");
                if (t) return "ringsDocSbFold:@t:" + t.slice(0, 48);
              }
              return "";
            }
            var RINGS_SIDEBAR_DEFAULT_FOLDED_LABELS = {
              "\u7ec4\u4ef6\u7cfb\u7edf": 1,
              "\u7269\u7406\u5f15\u64ce\u7cfb\u7edf": 1,
              "\u6570\u636e\u5904\u7406": 1,
              API: 1,
              "\u7c7b": 1,
              "\u679a\u4e3e": 1,
              "\u63a5\u53e3": 1,
            };
            /** 仅取一级标题文字，勿用 firstNavLink（会误取 Engine3D 等子链接） */
            function topLevelGroupLabel(li) {
              var t = titleClickTarget(li);
              if (t) return (t.textContent || "").trim().replace(/\s+/g, " ");
              return "";
            }
            function shouldDefaultFold(root, li) {
              var label = topLevelGroupLabel(li);
              return !!RINGS_SIDEBAR_DEFAULT_FOLDED_LABELS[label];
            }
            function isDefaultFoldedGroup(li) {
              var root = sidebarRootUl();
              return !!(root && shouldDefaultFold(root, li));
            }
            function foldDefaultLi(li) {
              var uls = li.getElementsByTagName("ul");
              var i;
              li.dataset.ringsDefaultFold = "1";
              li.classList.add("rings-doc-fold-default", "rings-sidebar-folded");
              for (i = 0; i < uls.length; i++)
                uls[i].classList.add("rings-sidebar-sub-folded");
            }
            function unfoldDefaultLi(li) {
              var uls = li.getElementsByTagName("ul");
              var i;
              delete li.dataset.ringsDefaultFold;
              li.classList.remove(
                "rings-doc-fold-default",
                "rings-sidebar-folded"
              );
              for (i = 0; i < uls.length; i++)
                uls[i].classList.remove("rings-sidebar-sub-folded");
            }
            /** 用户点击标题手动展开时标记，避免路由回调再次强制收起 */
            function toggleDefaultFoldByUser(li) {
              var folded = li.classList.contains("rings-sidebar-folded");
              if (folded) {
                li.classList.add("rings-sidebar-user-open");
                unfoldDefaultLi(li);
              } else {
                li.classList.remove("rings-sidebar-user-open");
                foldDefaultLi(li);
              }
            }
            function saveSidebarFoldPreference(li) {
              if (isDefaultFoldedGroup(li)) return;
              try {
                var k = sidebarFoldStorageKey(li);
                if (!k) return;
                if (li.classList.contains("rings-sidebar-folded"))
                  sessionStorage.setItem(k, "1");
                else sessionStorage.setItem(k, "0");
              } catch (e) {}
            }
            function allSubmenuUls(li) {
              var out = [];
              var uls = li.querySelectorAll("ul");
              var i;
              for (i = 0; i < uls.length; i++) out.push(uls[i]);
              return out;
            }
            function hasCollapsibleSubmenu(li) {
              return allSubmenuUls(li).length > 0;
            }
            function isSidebarGroupFolded(li) {
              var subs, i, style;
              if (li.classList.contains("rings-sidebar-folded")) return true;
              if (
                li.dataset.ringsDefaultFold === "1" &&
                !li.classList.contains("rings-sidebar-host-open") &&
                !li.classList.contains("rings-sidebar-user-open")
              )
                return true;
              subs = allSubmenuUls(li);
              if (!subs.length) return false;
              for (i = 0; i < subs.length; i++) {
                if (subs[i].classList.contains("rings-sidebar-sub-folded"))
                  return true;
                style = window.getComputedStyle
                  ? window.getComputedStyle(subs[i])
                  : null;
                if (style && style.display === "none") return true;
              }
              return false;
            }
            function setFoldUi(li, folded) {
              var subs = allSubmenuUls(li);
              var i;
              if (folded) {
                li.classList.add("rings-sidebar-folded");
                for (i = 0; i < subs.length; i++)
                  subs[i].classList.add("rings-sidebar-sub-folded");
              } else {
                li.classList.remove("rings-sidebar-folded");
                for (i = 0; i < subs.length; i++)
                  subs[i].classList.remove("rings-sidebar-sub-folded");
              }
            }
            function toggleSidebarGroup(li) {
              var rootNav = sidebarRootUl();
              if (rootNav && shouldDefaultFold(rootNav, li)) {
                toggleDefaultFoldByUser(li);
                return;
              }
              var folded = !li.classList.contains("rings-sidebar-folded");
              setFoldUi(li, folded);
              if (!folded) li.classList.add("rings-sidebar-user-open");
              else li.classList.remove("rings-sidebar-user-open");
              saveSidebarFoldPreference(li);
            }
            /** 默认收起组：每次刷新强制收起；仅当前页落在该组内时展开（host） */
            function applyDefaultSidebarFolds() {
              var root = sidebarRootUl();
              if (!root) return;
              var hostLi = getHostTopLevelLi(root);
              var j, li, marked, k, pendingHostLabel;
              try {
                pendingHostLabel =
                  sessionStorage.getItem("ringsDocSbPendingHostLabel") || "";
              } catch (e) {
                pendingHostLabel = "";
              }
              marked = root.querySelectorAll("li.rings-sidebar-host-open");
              for (k = 0; k < marked.length; k++)
                marked[k].classList.remove("rings-sidebar-host-open");
              for (j = 0; j < root.children.length; j++) {
                li = root.children[j];
                if (!li || li.tagName !== "LI") continue;
                if (!shouldDefaultFold(root, li)) continue;
                if (
                  (hostLi && li === hostLi) ||
                  (pendingHostLabel && topLevelGroupLabel(li) === pendingHostLabel)
                ) {
                  li.classList.add("rings-sidebar-host-open");
                  unfoldDefaultLi(li);
                } else if (li.classList.contains("rings-sidebar-user-open")) {
                  li.classList.remove("rings-sidebar-host-open");
                  unfoldDefaultLi(li);
                } else {
                  li.classList.remove("rings-sidebar-host-open");
                  li.classList.remove("rings-sidebar-user-open");
                  foldDefaultLi(li);
                }
              }
            }
            /** Docsify 换页会重建侧栏；恢复用户手动折叠/展开的非默认分组，避免点单页链接牵连其它分组 */
            function restoreSidebarFoldPreferences() {
              var root = sidebarRootUl();
              if (!root) return;
              var hostLi = getHostTopLevelLi(root);
              var j, li, k, stored;
              for (j = 0; j < root.children.length; j++) {
                li = root.children[j];
                if (!li || li.tagName !== "LI") continue;
                if (!hasCollapsibleSubmenu(li)) continue;
                if (shouldDefaultFold(root, li)) continue;
                if (hostLi && li === hostLi) continue;
                k = sidebarFoldStorageKey(li);
                if (!k) continue;
                try {
                  stored = sessionStorage.getItem(k);
                  if (stored === "1") setFoldUi(li, true);
                  else if (stored === "0") setFoldUi(li, false);
                } catch (e) {}
              }
            }
            /** 点击普通链接前保存当前侧栏状态，防止 Docsify 重建后其它组回到默认展开 */
            function captureSidebarFoldPreferences(clickedLink) {
              var root = sidebarRootUl();
              if (!root) return;
              var j, li, k, el, clickedHost, label;
              if (clickedLink) {
                el = clickedLink;
                while (el && el.parentNode && el.parentNode !== root) {
                  el = el.parentNode;
                }
                if (el && el.tagName === "LI") clickedHost = el;
                if (clickedHost) {
                  label = topLevelGroupLabel(clickedHost);
                  try {
                    if (label)
                      sessionStorage.setItem(
                        "ringsDocSbPendingHostLabel",
                        label
                      );
                  } catch (e) {}
                }
              }
              for (j = 0; j < root.children.length; j++) {
                li = root.children[j];
                if (!li || li.tagName !== "LI") continue;
                if (!hasCollapsibleSubmenu(li)) continue;
                if (shouldDefaultFold(root, li)) continue;
                k = sidebarFoldStorageKey(li);
                if (!k) continue;
                try {
                  sessionStorage.setItem(
                    k,
                    isSidebarGroupFolded(li) ? "1" : "0"
                  );
                } catch (e) {}
              }
            }
            var RINGS_SIDEBAR_LAST_HOST_KEY = "ringsDocSbLastHostHref";
            /** 换页后：仅当「当前一级」相对上次变化时强制展开 host（同页内 hash 变化不冲掉用户折叠） */
            function expandActiveHostGroup() {
              var root = sidebarRootUl();
              if (!root) return;
              var hostLi = getHostTopLevelLi(root);
              if (!hostLi) return;
              var curKey = sidebarFoldStorageKey(hostLi);
              var last = "";
              try {
                last = sessionStorage.getItem(RINGS_SIDEBAR_LAST_HOST_KEY) || "";
              } catch (e) {}
              if (!curKey || curKey !== last) setFoldUi(hostLi, false);
              try {
                sessionStorage.setItem(RINGS_SIDEBAR_LAST_HOST_KEY, curKey || last);
              } catch (e2) {}
            }
            function bindTitleToggle(li) {
              if (!hasCollapsibleSubmenu(li)) {
                li.classList.remove("rings-sidebar-group");
                delete li.dataset.ringsSidebarToggle;
                return;
              }
              li.classList.add("rings-sidebar-group");
              var target = titleClickTarget(li);
              if (!target) return;
              target.classList.add("rings-sidebar-title-toggle");
              if (li.dataset.ringsSidebarToggle === "1") return;
              li.dataset.ringsSidebarToggle = "1";
              (function (liNode, el) {
                el.addEventListener("click", function (e) {
                  e.preventDefault();
                  e.stopPropagation();
                  toggleSidebarGroup(liNode);
                });
              })(li, target);
            }
            function setupSidebar() {
              var root = sidebarRootUl();
              if (!root) return;
              cleanupLegacyCarets(root);
              var j, li;
              for (j = 0; j < root.children.length; j++) {
                li = root.children[j];
                if (!li || li.tagName !== "LI") continue;
                bindTitleToggle(li);
              }
            }
            function tick() {
              setupSidebar();
              restoreSidebarFoldPreferences();
            }
            /** 换页或首屏：当前一级展开 + 默认收起 API/类/枚举/接口 */
            function tickAfterRoute() {
              setupSidebar();
              expandActiveHostGroup();
              restoreSidebarFoldPreferences();
              applyDefaultSidebarFolds();
            }
            function observeSidebar() {
              var side =
                document.querySelector("aside.sidebar") ||
                document.querySelector(".sidebar");
              if (!side || side.dataset.ringsSidebarMo === "1") return;
              side.dataset.ringsSidebarMo = "1";
              side.addEventListener(
                "click",
                function (e) {
                  var a = e.target && e.target.closest
                    ? e.target.closest(".sidebar-nav a")
                    : null;
                  if (a) captureSidebarFoldPreferences(a);
                },
                true
              );
              var t = null;
              var mo = new MutationObserver(function () {
                clearTimeout(t);
                t = setTimeout(tick, 20);
              });
              mo.observe(side, { childList: true, subtree: true });
            }
            var pollId = null;
            function startPoll() {
              if (pollId != null) return;
              var n = 0;
              pollId = setInterval(function () {
                tick();
                n++;
                if (n > 50) {
                  clearInterval(pollId);
                  pollId = null;
                }
              }, 100);
            }
            hook.mounted(function () {
              observeSidebar();
              tickAfterRoute();
              startPoll();
              setTimeout(tickAfterRoute, 0);
              setTimeout(tick, 60);
              setTimeout(tick, 250);
            });
            hook.ready(function () {
              tickAfterRoute();
              startPoll();
              setTimeout(tickAfterRoute, 0);
              setTimeout(tick, 150);
              setTimeout(tick, 600);
            });
            hook.doneEach(function () {
              tickAfterRoute();
              setTimeout(tick, 0);
              setTimeout(tick, 80);
              setTimeout(tick, 400);
            });
            window.addEventListener("load", function () {
              tickAfterRoute();
              startPoll();
            });
          },
        ],
      };
    </script>
    <!-- Docsify v4 -->
    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  </body>
</html>
